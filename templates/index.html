<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENAI Academic Helpdesk</title>

    <style>
        
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg, #74ebd5, #9face6);
    min-height:100vh;
}

.container{
    width:950px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    font-size:55px;
    color:#2c3e50;
    margin-bottom:10px;
    font-weight:bold;
    text-align:center;
}

.subtitle{
    font-size:22px;
    color:#555;
    margin-bottom:30px;
    text-align:center;
}

.menu{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
}

.menu button{
    width:140px;
    height:55px;
    border:none;
    background: linear-gradient(45deg, #ff9966, #ff5e62);
    color:white;
    font-size:20px;
    cursor:pointer;
    border-radius:10px;
    transition:0.3s;
    font-weight:bold;
}

.menu button:hover{
    transform:scale(1.05);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.chat-box{
    width:100%;
    height:420px;
    border:none;
    padding:15px;
    overflow-y:scroll;
    font-size:18px;
    background:#f8f9fa;
    border-radius:15px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
    color:#333;
}

p{
    font-size:18px;
    font-weight:500;
    background:#dff9fb;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.input-area{
    display:flex;
    margin-top:15px;
    gap:10px;
}

.input-area input{
    flex:1;
    height:60px;
    border:2px solid #6c5ce7;
    padding-left:20px;
    font-size:20px;
    border-radius:12px;
    outline:none;
}

.input-area input:focus{
    border-color:#00cec9;
}

.input-area button{
    width:120px;
    border:none;
    background: linear-gradient(45deg, #36d1dc, #5b86e5);
    color:white;
    font-size:24px;
    cursor:pointer;
    border-radius:12px;
    transition:0.3s;
    font-weight:bold;
}

.input-area button:hover{
    transform:scale(1.05);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Scrollbar */
.chat-box::-webkit-scrollbar{
    width:8px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#888;
    border-radius:10px;
}

.chat-box::-webkit-scrollbar-thumb:hover{
    background:#555;
}
</style>
</head>
<body>

    <div class="container">

        <h1>GENAI Academic Helpdesk</h1>

        <p class="subtitle">
            your intelligent campus assistant
        </p>

        <div class="menu">
            <button onClick="setQuestion('what is library thing')">Library</button>
            <button onClick="setQuestion('what is Placement eligibility')">Placement</button>
            <button onClick="setQuestion('what are the hostel rules')">Hostel</button>
            <button onClick="setQuestion('when do exam start')">Exams</button>
        </div>

        <div class="chat-box">
            <p>
                Hello! I am your GENAI Academic Assistant.
                Ask anything about:<br>
                syllabus, placements, hostel, exams and more
            </p>
        </div>

        <div class="input-area">
            <input type="text" id="question" placeholder="Ask your question....">
            <button onClick="ask()">Send</button>
        </div>

    </div>
<script>

function setQuestion(text){
    document.getElementById("question").value = text;
}

async function ask(){

    let q = document.getElementById("question").value;

    if(q.trim()=="") return;

    let box = document.querySelector(".chat-box");

    // user message

    box.innerHTML += `
    <div class="user-msg">
        ${q}
        <div class="time">
            ${new Date().toLocaleTimeString()}
        </div>
    </div>`;

    // typing effect

    box.innerHTML += `
    <div class="typing" id="loading">
        AI is typing...
    </div>`;

    box.scrollTop = box.scrollHeight;

    document.getElementById("question").value = "";

    let res = await fetch("/ask",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            question:q
        })
    });

    let data = await res.json();

    document.getElementById("loading").remove();

    // bot response

    box.innerHTML += `
    <div class="bot-msg">
        ${data.answer}
        <div class="time">
            ${new Date().toLocaleTimeString()}
        </div>
    </div>`;

    box.scrollTop = box.scrollHeight;
}

/* Enter key */

document.getElementById("question").addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        ask();
    }

});

</script>
</body>
</html>
